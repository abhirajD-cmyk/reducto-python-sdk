<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Oracle Database approach capability map</title>
  <desc id="desc">Enterprise comparison of standalone vector database platforms and Oracle Database, with Reducto AI contribution domains.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#403930" flood-opacity="0.11"/>
    </filter>
    <pattern id="thinGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#ded6ca" stroke-width="0.8" opacity="0.45"/>
    </pattern>
    <style>
      .page { fill:#f5f0e7; }
      .grid { fill:url(#thinGrid); }
      .card { fill:#fffaf0; stroke:#d8d0c4; stroke-width:1.2; }
      .dark { fill:#24211d; }
      .ink { fill:#27241f; }
      .muted { fill:#6e675f; }
      .red { fill:#c74634; }
      .blue { fill:#4f7289; }
      .teal { fill:#5c8b84; }
      .amber { fill:#b98542; }
      .hair { stroke:#d8d0c4; stroke-width:1.2; }
      .redStroke { stroke:#c74634; stroke-width:2; }
      .dash { stroke:#bfb5a7; stroke-width:1.6; stroke-dasharray:8 8; fill:none; }
      .titleText { font-family:Inter, "Helvetica Neue", Arial, sans-serif; font-weight:800; letter-spacing:0; }
      .body { font-family:Inter, "Helvetica Neue", Arial, sans-serif; font-weight:500; letter-spacing:0; }
      .small { font-family:Inter, "Helvetica Neue", Arial, sans-serif; font-weight:700; letter-spacing:0; }
      .mono { font-family:"SFMono-Regular", Consolas, "Liberation Mono", monospace; font-weight:700; letter-spacing:2px; }
      .mono2 { font-family:"SFMono-Regular", Consolas, "Liberation Mono", monospace; font-weight:600; letter-spacing:1px; }
    </style>
  </defs>

  <rect class="page" width="1920" height="1080"/>
  <rect class="grid" width="1920" height="1080" opacity="0.48"/>

  <text x="92" y="70" class="mono" font-size="17" fill="#c74634">ORACLE AI / CAPABILITY MAP</text>
  <line x1="92" y1="94" x2="452" y2="94" stroke="#c74634" stroke-width="4" stroke-linecap="round"/>
  <text x="1828" y="70" text-anchor="end" class="mono2" font-size="15" fill="#7b7369">STRATEGIC COMPARISON</text>
  <text x="92" y="154" class="titleText" font-size="52" fill="#27241f">Why Oracle Database Instead of Standalone Vector Platforms</text>
  <text x="94" y="194" class="body" font-size="24" fill="#6e675f">A governed enterprise platform reduces duplication, operational silos, and fragmented control models.</text>

  <g transform="translate(92 232)">
    <rect width="508" height="566" rx="22" class="card" filter="url(#shadow)"/>
    <rect x="0" y="0" width="508" height="76" rx="22" fill="#24211d"/>
    <path d="M0 54h508v22H0z" fill="#24211d"/>
    <text x="28" y="47" class="titleText" font-size="25" fill="#ffffff">Standalone Vector Database Approach</text>

    <text x="28" y="118" class="mono" font-size="15" fill="#4f7289">BENEFITS</text>
    <line x1="28" y1="139" x2="460" y2="139" class="hair"/>
    <circle cx="40" cy="177" r="5" class="blue"/><text x="61" y="185" class="body" font-size="23" fill="#27241f">Fast proof of concept</text>
    <circle cx="40" cy="218" r="5" class="blue"/><text x="61" y="226" class="body" font-size="23" fill="#27241f">Specialized vector indexing</text>
    <circle cx="40" cy="259" r="5" class="blue"/><text x="61" y="267" class="body" font-size="23" fill="#27241f">Simple developer onboarding</text>

    <text x="28" y="326" class="mono" font-size="15" fill="#c74634">CHALLENGES</text>
    <line x1="28" y1="347" x2="460" y2="347" class="hair"/>
    <rect x="28" y="374" width="202" height="34" rx="8" fill="#f4e4de" stroke="#dfb5aa"/>
    <text x="43" y="397" class="small" font-size="17" fill="#7f2f24">Separate security model</text>
    <rect x="248" y="374" width="212" height="34" rx="8" fill="#f4e4de" stroke="#dfb5aa"/>
    <text x="263" y="397" class="small" font-size="17" fill="#7f2f24">Additional infrastructure</text>
    <rect x="28" y="425" width="154" height="34" rx="8" fill="#f4e4de" stroke="#dfb5aa"/>
    <text x="43" y="448" class="small" font-size="17" fill="#7f2f24">Data duplication</text>
    <rect x="200" y="425" width="260" height="34" rx="8" fill="#f4e4de" stroke="#dfb5aa"/>
    <text x="215" y="448" class="small" font-size="17" fill="#7f2f24">Governance fragmentation</text>
    <rect x="28" y="476" width="284" height="34" rx="8" fill="#f4e4de" stroke="#dfb5aa"/>
    <text x="43" y="499" class="small" font-size="17" fill="#7f2f24">Limited transactional consistency</text>
    <rect x="28" y="527" width="234" height="34" rx="8" fill="#f4e4de" stroke="#dfb5aa"/>
    <text x="43" y="550" class="small" font-size="17" fill="#7f2f24">Multiple operational silos</text>
  </g>

  <g transform="translate(640 232)">
    <rect width="1188" height="566" rx="22" fill="#fffaf0" stroke="#c74634" stroke-width="2" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1188" height="76" rx="22" fill="#c74634"/>
    <path d="M0 54h1188v22H0z" fill="#c74634"/>
    <text x="30" y="47" class="titleText" font-size="29" fill="#ffffff">Oracle Database Approach</text>
    <text x="1158" y="47" text-anchor="end" class="mono2" font-size="15" fill="#ffe7de">UNIFIED GOVERNED PLATFORM</text>

    <g transform="translate(28 112)">
      <rect width="260" height="178" rx="16" fill="#f7f2e9" stroke="#d8d0c4"/>
      <text x="22" y="36" class="mono" font-size="14" fill="#4f7289">UNIFIED DATA PLATFORM</text>
      <text x="22" y="70" class="body" font-size="19" fill="#27241f">Relational data</text>
      <text x="22" y="98" class="body" font-size="19" fill="#27241f">JSON data</text>
      <text x="22" y="126" class="body" font-size="19" fill="#27241f">Graph data / Spatial data</text>
      <text x="22" y="154" class="body" font-size="19" fill="#27241f">Text data / Vector data</text>
    </g>
    <g transform="translate(316 112)">
      <rect width="260" height="178" rx="16" fill="#f7f2e9" stroke="#d8d0c4"/>
      <text x="22" y="36" class="mono" font-size="14" fill="#c74634">ENTERPRISE SECURITY</text>
      <text x="22" y="70" class="body" font-size="19" fill="#27241f">IAM integration</text>
      <text x="22" y="98" class="body" font-size="19" fill="#27241f">RBAC controls</text>
      <text x="22" y="126" class="body" font-size="19" fill="#27241f">Row-level security</text>
      <text x="22" y="154" class="body" font-size="19" fill="#27241f">Encryption / Audit logging</text>
    </g>
    <g transform="translate(604 112)">
      <rect width="260" height="178" rx="16" fill="#f7f2e9" stroke="#d8d0c4"/>
      <text x="22" y="36" class="mono" font-size="14" fill="#5c8b84">PRODUCTION READINESS</text>
      <text x="22" y="70" class="body" font-size="19" fill="#27241f">High availability</text>
      <text x="22" y="98" class="body" font-size="19" fill="#27241f">Backup and recovery</text>
      <text x="22" y="126" class="body" font-size="19" fill="#27241f">Disaster recovery</text>
      <text x="22" y="154" class="body" font-size="19" fill="#27241f">Operational tooling</text>
    </g>
    <g transform="translate(892 112)">
      <rect width="268" height="178" rx="16" fill="#24211d" stroke="#24211d"/>
      <text x="22" y="36" class="mono" font-size="14" fill="#f2b7ad">AI-NATIVE CAPABILITIES</text>
      <text x="22" y="66" class="body" font-size="18" fill="#ffffff">Native VECTOR datatype</text>
      <text x="22" y="92" class="body" font-size="18" fill="#ffffff">Vector indexing</text>
      <text x="22" y="118" class="body" font-size="18" fill="#ffffff">Similarity search</text>
      <text x="22" y="144" class="body" font-size="18" fill="#ffffff">Hybrid search</text>
      <text x="22" y="170" class="body" font-size="18" fill="#ffffff">In-database AI processing</text>
    </g>

    <path d="M42 340h1104" class="dash"/>
    <text x="30" y="378" class="mono" font-size="15" fill="#7b7369">ORACLE DATABASE AI FOUNDATION</text>
    <g transform="translate(30 404)">
      <rect width="264" height="98" rx="14" fill="#eef3f4" stroke="#c9d8dc"/>
      <text x="20" y="35" class="titleText" font-size="22" fill="#27241f">Intelligence Layer</text>
      <text x="20" y="63" class="body" font-size="17" fill="#536b78">Vector Search / Hybrid Retrieval</text>
      <text x="20" y="86" class="body" font-size="17" fill="#536b78">Semantic Similarity</text>
    </g>
    <g transform="translate(318 404)">
      <rect width="264" height="98" rx="14" fill="#f7f2e9" stroke="#d8d0c4"/>
      <text x="20" y="35" class="titleText" font-size="22" fill="#27241f">Data Layer</text>
      <text x="20" y="63" class="body" font-size="17" fill="#6e675f">VECTOR / JSON / SQL</text>
      <text x="20" y="86" class="body" font-size="17" fill="#6e675f">Text Indexes</text>
    </g>
    <g transform="translate(606 404)">
      <rect width="264" height="98" rx="14" fill="#f4e4de" stroke="#dfb5aa"/>
      <text x="20" y="35" class="titleText" font-size="22" fill="#27241f">Governance Layer</text>
      <text x="20" y="63" class="body" font-size="17" fill="#7f2f24">Security / Compliance</text>
      <text x="20" y="86" class="body" font-size="17" fill="#7f2f24">Auditing / Data Protection</text>
    </g>
    <g transform="translate(894 404)">
      <rect width="264" height="98" rx="14" fill="#eff2ec" stroke="#ccd6c6"/>
      <text x="20" y="35" class="titleText" font-size="22" fill="#27241f">Infrastructure Layer</text>
      <text x="20" y="63" class="body" font-size="17" fill="#5f705a">HA / Scalability</text>
      <text x="20" y="86" class="body" font-size="17" fill="#5f705a">Backup / Disaster Recovery</text>
    </g>
  </g>

  <g transform="translate(92 842)">
    <rect width="1736" height="158" rx="22" fill="#24211d" filter="url(#shadow)"/>
    <text x="30" y="42" class="mono" font-size="16" fill="#d8d0c4">REDUCTO AI CONTRIBUTION LAYER</text>
    <line x1="30" y1="65" x2="414" y2="65" stroke="#c74634" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(30 84)">
      <text x="0" y="0" class="titleText" font-size="24" fill="#ffffff">Content Extraction</text>
      <text x="0" y="31" class="body" font-size="16" fill="#d8d0c4">PDF processing / Document parsing</text>
      <text x="0" y="55" class="body" font-size="16" fill="#d8d0c4">OCR enhancement / Multi-format ingestion</text>
    </g>
    <g transform="translate(458 84)">
      <text x="0" y="0" class="titleText" font-size="24" fill="#ffffff">Semantic Enrichment</text>
      <text x="0" y="31" class="body" font-size="16" fill="#d8d0c4">Layout awareness / Table understanding</text>
      <text x="0" y="55" class="body" font-size="16" fill="#d8d0c4">Section detection / Metadata generation</text>
    </g>
    <g transform="translate(900 84)">
      <text x="0" y="0" class="titleText" font-size="24" fill="#ffffff">Retrieval Optimization</text>
      <text x="0" y="31" class="body" font-size="16" fill="#d8d0c4">Intelligent chunking / Context preservation</text>
      <text x="0" y="55" class="body" font-size="16" fill="#d8d0c4">Semantic segmentation / Search readiness</text>
    </g>
    <g transform="translate(1344 84)">
      <text x="0" y="0" class="titleText" font-size="24" fill="#ffffff">Knowledge Structuring</text>
      <text x="0" y="31" class="body" font-size="16" fill="#d8d0c4">Entity extraction / Relationship discovery</text>
      <text x="0" y="55" class="body" font-size="16" fill="#d8d0c4">Content normalization</text>
    </g>
  </g>
</svg>
